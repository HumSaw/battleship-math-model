name: Bug report
description: Report a reproducible UI or engine defect
title: "[Bug]: "
labels: [bug]
body:
  - type: dropdown
    id: rules
    attributes:
      label: Rule set
      options: [Russian classic, International, Not applicable]
    validations:
      required: true
  - type: textarea
    id: position
    attributes:
      label: Board state
      description: List miss, hit, and sunk coordinates. Include explicit sunk ships where relevant.
      placeholder: "Misses: A1; hits: D5; sunk ships: [B2, B3]"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
  - type: textarea
    id: logs
    attributes:
      label: Additional context
      description: Add screenshots or console output; remove sensitive information.

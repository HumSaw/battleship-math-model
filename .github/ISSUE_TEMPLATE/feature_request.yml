name: Feature request
description: Propose a focused improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or analysis problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: model
    attributes:
      label: Mathematical or rule assumptions
      description: Explain any change to priors, legality, probability estimates, or policy.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
